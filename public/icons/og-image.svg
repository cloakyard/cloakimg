<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 630" width="1200" height="630"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
     style="fill-rule:evenodd;clip-rule:evenodd;">

  <defs>
    <!-- Sky: clean white at top, peach intensifying only in the lower half -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#fff7f1"/>
      <stop offset="0.75" stop-color="#ffe2c4"/>
      <stop offset="1" stop-color="#ffc089"/>
    </linearGradient>

    <!-- Sun glow, low and warm -->
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3c4" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#ffd28a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffa46b" stop-opacity="0"/>
    </radialGradient>

    <!-- Coral horizon band -->
    <linearGradient id="horizon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5613a" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f5613a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#c2410c" stop-opacity="0.30"/>
    </linearGradient>

    <!-- CloakIMG brand mark gradient (matches favicon.svg) -->
    <linearGradient id="markBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="markGlow" cx="0.5" cy="0.36" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Cloakyard family mark gradient (matches cloakyard.svg) -->
    <linearGradient id="cyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <radialGradient id="cyBloom" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Drifting peach blob -->
    <radialGradient id="blob" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb37a" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffb37a" stop-opacity="0"/>
    </radialGradient>

    <!-- Card surface tint -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.86"/>
    </linearGradient>

    <!-- CloakIMG brand mark (favicon.svg shape) -->
    <symbol id="brandmark" viewBox="0 0 144 144">
      <circle cx="72" cy="72" r="64" fill="url(#markBg)"/>
      <circle cx="72" cy="72" r="64" fill="url(#markGlow)"/>
      <path d="M72,30L38,44L38,76C38,93.333 49.333,107.333 72,118C94.667,107.333 106,93.333 106,76L106,44L72,30Z"
            fill="white" fill-opacity="0.18"/>
      <path d="M72,30L38,44L38,76C38,93.333 49.333,107.333 72,118C94.667,107.333 106,93.333 106,76L106,44L72,30Z"
            fill="none" stroke="white" stroke-opacity="0.55" stroke-width="3"/>
      <circle cx="81" cy="53" r="5" fill="white"/>
      <path d="M46,92L60,70L72,84L86,64L100,92"
            transform="matrix(0.962963 0 0 0.928571 1.703704 4.571429)"
            fill="none" stroke="white" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- Cloakyard family mark (cloakyard.svg shape) -->
    <symbol id="cloakyardmark" viewBox="0 0 144 144">
      <circle cx="72" cy="72" r="64" fill="url(#cyBg)"/>
      <circle cx="72" cy="72" r="64" fill="url(#cyBloom)"/>
      <path d="M 72 30 L 38 44 L 38 76 Q 38 102 72 118 Q 106 102 106 76 L 106 44 Z"
            fill="#ffffff" fill-opacity="0.18"/>
      <path d="M 72 30 L 38 44 L 38 76 Q 38 102 72 118 Q 106 102 106 76 L 106 44 Z"
            fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.65"/>
    </symbol>
  </defs>

  <!-- ─── Backdrop ─────────────────────────────────────────────────── -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Coral horizon (bottom third only) -->
  <rect x="0" y="450" width="1200" height="180" fill="url(#horizon)"/>

  <!-- Sun glow seated low so the upper half stays clean -->
  <circle cx="600" cy="540" r="320" fill="url(#sun)"/>

  <!-- Drifting peach blobs: lower half only -->
  <ellipse cx="-60" cy="510" rx="280" ry="240" fill="url(#blob)" opacity="0.65"/>
  <ellipse cx="1080" cy="460" rx="300" ry="260" fill="url(#blob)" opacity="0.55"/>
  <ellipse cx="600" cy="610" rx="520" ry="180" fill="url(#blob)" opacity="0.45"/>

  <!-- ─── Brand mark (top-center, larger) ──────────────────────────── -->
  <g transform="translate(540 36)">
    <use href="#brandmark" width="120" height="120"/>
  </g>

  <!-- ─── Wordmark + tagline ───────────────────────────────────────── -->
  <g text-anchor="middle">
    <text x="600" y="240" font-size="80" font-weight="700"
          letter-spacing="-2" fill="#1e293b">Cloak<tspan fill="#f5613a">IMG</tspan></text>
    <text x="600" y="288" font-size="23" font-weight="500"
          letter-spacing="-0.3" fill="#475569">A minimal photo editor that respects your photos</text>
  </g>

  <!-- ─── Feature tiles (2 × 2) ────────────────────────────────────── -->
  <!-- Tile 1: Crop & Retouch -->
  <g>
    <rect x="220" y="330" width="340" height="62" rx="14"
          fill="url(#card)" stroke="rgba(245,97,58,0.20)" stroke-width="1"/>
    <rect x="240" y="346" width="30" height="30" rx="8" fill="#fff1e8"/>
    <g transform="translate(243 349)" stroke="#f5613a" stroke-width="2"
       fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2v14a2 2 0 0 0 2 2h14M6 6h14a2 2 0 0 1 2 2v14"/>
    </g>
    <text x="288" y="357" font-size="17" font-weight="700" fill="#1e293b">Crop &amp; Retouch</text>
    <text x="288" y="378" font-size="12.5" fill="#475569">Aspect-ratio crops, spot heal, smart resize</text>
  </g>

  <!-- Tile 2: Adjust & Filter -->
  <g>
    <rect x="640" y="330" width="340" height="62" rx="14"
          fill="url(#card)" stroke="rgba(245,97,58,0.20)" stroke-width="1"/>
    <rect x="660" y="346" width="30" height="30" rx="8" fill="#fff1e8"/>
    <g transform="translate(663 349)" stroke="#f5613a" stroke-width="2"
       fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/>
    </g>
    <text x="708" y="357" font-size="17" font-weight="700" fill="#1e293b">Adjust &amp; Filter</text>
    <text x="708" y="378" font-size="12.5" fill="#475569">11 sliders + 27 vintage-inspired presets</text>
  </g>

  <!-- Tile 3: Redact & Strip EXIF -->
  <g>
    <rect x="220" y="408" width="340" height="62" rx="14"
          fill="url(#card)" stroke="rgba(245,97,58,0.20)" stroke-width="1"/>
    <rect x="240" y="424" width="30" height="30" rx="8" fill="#fff1e8"/>
    <g transform="translate(243 427)" stroke="#f5613a" stroke-width="2"
       fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
      <path d="M9 12l2 2 4-4"/>
    </g>
    <text x="288" y="435" font-size="17" font-weight="700" fill="#1e293b">Redact &amp; Strip EXIF</text>
    <text x="288" y="456" font-size="12.5" fill="#475569">Hide faces, scrub GPS &amp; camera metadata</text>
  </g>

  <!-- Tile 4: Frames & Layers (replaces background-removal tile) -->
  <g>
    <rect x="640" y="408" width="340" height="62" rx="14"
          fill="url(#card)" stroke="rgba(245,97,58,0.20)" stroke-width="1"/>
    <rect x="660" y="424" width="30" height="30" rx="8" fill="#fff1e8"/>
    <g transform="translate(663 427)" stroke="#f5613a" stroke-width="2"
       fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M7 7h10v10H7z"/>
    </g>
    <text x="708" y="435" font-size="17" font-weight="700" fill="#1e293b">Frames &amp; Layers</text>
    <text x="708" y="456" font-size="12.5" fill="#475569">Frames, watermarks, text &amp; shapes</text>
  </g>

  <!-- ─── Footer cluster — gaps tuned for an even rhythm down to the
       bottom edge: tiles → privacy ≈ 19, privacy → Cloakyard ≈ 15,
       Cloakyard → URL ≈ 18, URL → image bottom ≈ 15. ─────────────── -->

  <!-- Privacy strip (darker for legibility) -->
  <text x="600" y="500" text-anchor="middle"
        font-size="15" font-weight="600" fill="#334155" letter-spacing="0.1">
    No uploads &#160;·&#160; Works offline &#160;·&#160; Strip EXIF on demand &#160;·&#160; Open source
  </text>

  <!-- "Part of Cloakyard" mark -->
  <g transform="translate(508 518)">
    <use href="#cloakyardmark" width="40" height="40"/>
    <text x="52" y="26" font-size="15" font-weight="500" fill="#475569">Part of</text>
    <text x="105" y="26" font-size="15" font-weight="700" fill="#1e293b">Cloakyard</text>
  </g>

  <!-- URL chip (browser address-bar styling, generous breathing room) -->
  <g transform="translate(458 576)">
    <!-- Soft drop shadow for lift -->
    <rect x="0" y="3" width="284" height="36" rx="10"
          fill="#000000" fill-opacity="0.07"/>
    <!-- Address bar surface -->
    <rect width="284" height="36" rx="10"
          fill="#ffffff" fill-opacity="0.96"
          stroke="#f5613a" stroke-opacity="0.40" stroke-width="1"/>
    <!-- Privacy lock (mirrors the browser's secure-site cue) -->
    <g transform="translate(24 10)" stroke="#f5613a" stroke-width="1.7"
       fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="6" width="14" height="10" rx="2"/>
      <path d="M4 6V4a4 4 0 0 1 8 0v2"/>
    </g>
    <!-- URL: muted scheme + branded host, with extra letter-spacing -->
    <text y="23" font-size="14" letter-spacing="0.4">
      <tspan x="54" font-weight="500" fill="#94a3b8">https://</tspan>
      <tspan dx="4" font-weight="700" fill="#1e293b">img.cloakyard.com</tspan>
    </text>
  </g>

</svg>
