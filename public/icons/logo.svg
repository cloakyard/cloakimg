<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="0 0 144 144" role="img" aria-label="CloakIMG" style="fill-rule:evenodd;clip-rule:evenodd;">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="rgb(251,146,60)"/>
            <stop offset="1" stop-color="rgb(194,65,12)"/>
        </linearGradient>
        <radialGradient id="bloom" gradientUnits="userSpaceOnUse" cx="72" cy="50" r="110">
            <stop offset="0" stop-color="white" stop-opacity="0.32"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <path id="shield" d="M72,19.5L29.5,37L29.5,77C29.5,98.667 43.667,116.667 72,129.5C100.333,116.667 114.5,98.667 114.5,77L114.5,37L72,19.5Z"/>
        <clipPath id="shieldClip">
            <use href="#shield"/>
        </clipPath>
    </defs>

    <!-- Full-bleed background so the OS launcher mask has no transparent padding to crop -->
    <rect width="144" height="144" fill="url(#bg)"/>
    <rect width="144" height="144" fill="url(#bloom)"/>

    <!-- Shield — scaled to fill the maskable safe zone -->
    <use href="#shield" fill="white" fill-opacity="0.18"/>
    <use href="#shield" fill="none" stroke="white" stroke-opacity="0.55" stroke-width="3.75"/>

    <!-- Sun + mountain peaks, clipped to the shield silhouette -->
    <g clip-path="url(#shieldClip)">
        <circle cx="83.25" cy="48.25" r="6.25" fill="white"/>
        <path d="M39.5,94.5L56.375,69L70.75,85.25L87.625,62L104.5,94.5" fill="none" stroke="white" stroke-width="6.25" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
</svg>
